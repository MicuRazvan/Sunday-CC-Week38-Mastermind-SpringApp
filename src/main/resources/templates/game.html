<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mastermind Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .dot { height: 25px; width: 25px; border-radius: 50%; display: inline-block; border: 1px solid #000; }
        .Red { background-color: red; } .Blue { background-color: blue; }
        .Green { background-color: green; } .Yellow { background-color: yellow; }
        .Orange { background-color: orange; } .Purple { background-color: purple; }
    </style>
</head>
<body class="container py-4">

<div class="d-flex justify-content-between">
    <h2>Mastermind (<span th:text="${game.difficulty}"></span>)</h2>
    <form th:action="@{/new-game}" method="post">
        <input type="hidden" name="difficulty" th:value="${game.difficulty}">
        <button type="submit" class="btn btn-outline-danger">Restart / New Game</button>
    </form>
</div>

<div th:if="${game.won}" class="alert alert-success mt-3 text-center">
    <h2 class="display-4">🎉 YOU WIN! 🎉</h2>
    <p>You cracked the code!</p>
    <a href="/" class="btn btn-success">Main Menu</a>
</div>

<div th:if="${!game.won}" class="card my-4 p-3 shadow-sm">
    <form th:action="@{/guess}" method="post" class="row g-2 justify-content-center">
        <div th:each="i : ${#numbers.sequence(1, game.columns)}" class="col-auto">
            <select name="colors" class="form-select">
                <option th:each="color : ${availableColors}" th:value="${color}" th:text="${color}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-dark">Submit Guess</button>
        </div>
    </form>
</div>

<table class="table table-bordered mt-4">
    <thead class="table-light">
    <tr>
        <th>Attempt</th>
        <th>Guess</th>
        <th>Result</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="attempt, iter : ${game.attempts}">
        <td th:text="${game.attempts.size() - iter.index}"></td>
        <td>
            <span th:each="color : ${attempt.colors}" th:class="'dot ' + ${color}"></span>
        </td>
        <td>
            <span class="badge bg-dark" th:text="${attempt.blackPegs + ' Black (Exact)'}"></span>
            <span class="badge bg-secondary" th:text="${attempt.whitePegs + ' White (Color)'}"></span>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
