<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mastermind</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container text-center py-5">
<h1>Mastermind</h1>
<p>Break the secret code!</p>
<form th:action="@{/new-game}" method="post">
    <div class="mb-3">
        <select name="difficulty" class="form-select w-25 mx-auto">
            <option value="standard">Standard (4 Columns)</option>
            <option value="extra">Extra (8 Columns)</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary btn-lg">New Game</button>
</form>
</body>
</html>
